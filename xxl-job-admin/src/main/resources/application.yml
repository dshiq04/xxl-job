server:
  port: 8080
  servlet:
    context-path: /xxl-job-admin

management:
  endpoints:
    web:
      base-path: /actuator
  health:
    mail:
      enabled: false

spring:
  profiles:
    active: dev
  mvc:
    servlet:
      load-on-startup: 0
    static-path-pattern: /static/**
  web:
    resources:
      static-locations: classpath:/static/
  freemarker:
    templateLoaderPath: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    request-context-attribute: request
    settings:
      number_format: 0.##########
      new_builtin_class_resolver: safer
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:${xxl-job.database.type}://${xxl-job.database.host}:${xxl-job.database.port}/${xxl-job.database.database}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: ${xxl-job.database.username}
    password: ${xxl-job.database.password}
    driver-class-name: ${xxl-job.database.driver-class-name}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 900000
      connection-timeout: 10000
      connection-test-query: SELECT 1
      validation-timeout: 1000
  mail:
    host: smtp.qq.com
    port: 25
    username: xxx@qq.com
    from: xxx@qq.com
    password: xxx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

mybatis:
  mapper-locations: classpath:/mapper/*Mapper.xml

xxl:
  job:
    accessToken: ${XXL-JOB-ACCESS-TOKEN:tomori}
    timeout: 3
    i18n: zh_CN
    triggerpool:
      fast:
        max: 300
      slow:
        max: 200
    logretentiondays: 30
xxl-sso:
    token:
      key: xxl_job_login_token
      timeout: 604800000
    client:
      excluded:
        paths: ""
      login:
        path: /auth/login